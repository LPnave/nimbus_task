services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geosaas}
      POSTGRES_USER: ${POSTGRES_USER:-geosaas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geosaas} -d ${POSTGRES_DB:-geosaas}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend/GeoSaaS.Api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-geosaas};
        Username=${POSTGRES_USER:-geosaas};Password=${POSTGRES_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-32chars}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-60}
      Redis__ConnectionString: redis:6379
      Cors__Origins__0: http://localhost:3000
      Cors__Origins__1: http://localhost:5173
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
